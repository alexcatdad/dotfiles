version = 1
layout = "hybrid"

[packages]
common = [
  "starship",
  "eza",
  "fd",
  "ripgrep",
  "fzf",
  "zoxide",
  "jq",
  "gh",
  "tldr",
  "dust",
  "btop",
  "direnv",
  "fnm",
  "atuin",
  "go",
  "bun",
]
# TODO: "kilo code" intentionally omitted because no Homebrew formula/cask exists yet.
darwin = [
  "font-fira-code-nerd-font",
  "ghostty",
  "google-chrome",
  "cursor",
  "claude",
  "claude-code",
  "codex",
  "codex-app",
  "chatgpt",
  "gemini-cli",
  "bat",
  "tree",
  "wget",
  "git-extras",
  "orbstack",
  "fork",
  "notion",
  "proton-mail",
  "proton-pass",
  "helium-browser",
]
linux_apt = ["build-essential", "curl", "git"]
linux_brew = []
wsl_apt = ["build-essential", "curl", "git"]
wsl_brew = []

[hooks]
post_install = "[ -f ~/.claude/statusline-command.sh ] && chmod +x ~/.claude/statusline-command.sh || true"

[ignore]
paths = [
  ".zshrc.local",
  ".zshenv.local",
  ".gitconfig.local",
  ".ssh/config.local",
  ".claude/settings.local.json",
  ".claude/.credentials.json",
]

[backup]
enabled = true
max_age = 30
max_count = 5

[templates]
"templates/zshrc.local.template" = ".zshrc.local"
"templates/zshenv.local.template" = ".zshenv.local"
"templates/gitconfig.local.template" = ".gitconfig.local"
"templates/ssh-config.local.template" = ".ssh/config.local"
